<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#3b82f6">
  <meta name="description" content="简单实用的跨平台提醒工具">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
  <title>小提醒</title>
  <script src="/config.js"></script>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <header class="appbar">
      <h1>小提醒</h1>
      <button id="addBtn" class="btn-icon" aria-label="新建提醒">＋</button>
    </header>

    <!-- 新建提醒表单 -->
    <div id="formOverlay" class="overlay hidden">
      <div class="form-panel">
        <div class="form-header">
          <h2 id="formTitle">新建提醒</h2>
          <button id="formClose" class="btn-icon" aria-label="关闭">✕</button>
        </div>
        <form id="reminderForm" class="form-body">
          <div class="field">
            <label for="titleInput">提醒内容</label>
            <input type="text" id="titleInput" placeholder="要提醒我什么？" required autocomplete="off">
          </div>
          <div class="field">
            <label for="timeInput">提醒时间</label>
            <input type="datetime-local" id="timeInput" required>
          </div>
          <div class="field">
            <label for="repeatSelect">重复</label>
            <select id="repeatSelect">
              <option value="none">不重复</option>
              <option value="daily">每天</option>
              <option value="weekly">每周</option>
              <option value="monthly">每月</option>
            </select>
          </div>
          <button type="submit" class="btn-primary" id="submitBtn">添加提醒</button>
        </form>
      </div>
    </div>

    <!-- 过滤切换 -->
    <div class="tabs">
      <button class="tab active" data-filter="pending">待提醒</button>
      <button class="tab" data-filter="done">已完成</button>
    </div>

    <!-- 通知状态 -->
    <div class="notif-bar" id="notifBar">
      <span id="notifStatus">检查通知权限...</span>
      <button id="testNotifBtn" class="btn-link">测试通知</button>
    </div>

    <!-- 列表 -->
    <main id="reminderList" class="list"></main>

    <!-- 空状态 -->
    <div id="emptyState" class="empty-state hidden">
      <p>暂无提醒</p>
      <p class="sub">点击右上角 ＋ 创建</p>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
